<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<metadata>nasp:</metadata>
<defs>
<linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#B9F2FF"/>
<stop offset="25%" style="stop-color:#7DE3F5"/>
<stop offset="50%" style="stop-color:#4DD0E1"/>
<stop offset="75%" style="stop-color="#26C6DA"/>
<stop offset="100%" style="stop-color:#00ACC1"/>
</linearGradient>
<linearGradient id="ribbonCyan" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" style="stop-color:#00FFFF"/>
<stop offset="100%" style="stop-color:#008B8B"/>
</linearGradient>
<filter id="shadow"><feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/></filter>
<filter id="glow"><feGaussianBlur stdDeviation="3" result="glow"/><feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<!-- Background -->
<rect width="500" height="500" fill="#0f172a" rx="25"/>

<!-- Animated-style border -->
<rect x="10" y="10" width="480" height="480" fill="none" stroke="#00FFFF" stroke-width="2" rx="20" opacity="0.3"/>
<rect x="20" y="20" width="460" height="460" fill="none" stroke="#00FFFF" stroke-width="1" stroke-dasharray="15,5" rx="18" opacity="0.5"/>

<!-- Ribbon at top -->
<path d="M 150 30 L 200 80 L 250 30 L 300 80 L 350 30 L 350 100 L 150 100 Z" fill="url(#ribbonCyan)" filter="url(#shadow)"/>

<!-- Diamond badge -->
<circle cx="250" cy="200" r="110" fill="#0e1725" stroke="#00FFFF" stroke-width="4" filter="url(#shadow)"/>

<!-- Diamond shape -->
<g filter="url(#glow)">
<path d="M 250 120 L 310 180 L 250 280 L 190 180 Z" fill="url(#diamondGrad)" opacity="0.9"/>
<path d="M 250 120 L 280 180 L 250 230 L 220 180 Z" fill="#FFF" opacity="0.5"/>
</g>

<!-- Heart icon for community -->
<text x="250" y="215" text-anchor="middle" fill="#00FFFF" font-size="50" font-family="Arial, sans-serif">💎</text>

<!-- COMMUNITY CHOICE text -->
<text x="250" y="330" text-anchor="middle" fill="#00FFFF" font-size="22" font-family="monospace" font-weight="bold" filter="url(#glow)">COMMUNITY</text>
<text x="250" y="355" text-anchor="middle" fill="#7DE3F5" font-size="22" font-family="monospace" font-weight="bold">CHOICE</text>

<!-- Achievement details -->
<text x="250" y="385" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="monospace">SPECIAL RECOGNITION</text>

<!-- Description -->
<text x="250" y="415" text-anchor="middle" fill="#e2e8f0" font-size="11" font-family="monospace">For exceptional community impact</text>
<text x="250" y="430" text-anchor="middle" fill="#e2e8f0" font-size="11" font-family="monospace">and outstanding contribution</text>

<!-- Stats row -->
<rect x="100" y="450" width="300" height="35" fill="#1e293b" rx="5" opacity="0.8"/>
<text x="250" y="473" text-anchor="middle" fill="#00FFFF" font-size="14" font-family="monospace">AWARDED BY THE MOLTBOOK COMMUNITY</text>

<!-- Footer -->
<text x="250" y="492" text-anchor="middle" fill="#475569" font-size="8" font-family="monospace">NASP v1.0 • Blockchain-Free • github.com/obekt/niftyagents • 2026-03-21</text>
</svg>
