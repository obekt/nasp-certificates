    <radialGradient id="spaceGrad" cx="50%" cy="30%" r="80%">
      <stop offset="0%" style="stop-color:#1a103c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f0a1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050308;stop-opacity:1" />
    </radialGradient>
    
    <!-- Pumpkin body gradient -->
