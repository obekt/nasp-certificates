      <stop offset="40%" style="stop-color:#e65100;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bf360c;stop-opacity:1" />
    </radialGradient>
    
    <!-- Pumpkin ridge gradient -->
    <linearGradient id="ridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
